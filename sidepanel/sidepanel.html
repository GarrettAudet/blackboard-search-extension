<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Blackboard Transcript Search</title>
    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="brand-row">
        <div class="brand-mark">B</div>
        <div>
          <h1>SC Blackboard Assistant</h1>
          <p id="statusText">Loading local index...</p>
        </div>
      </div>
      <nav class="header-actions" aria-label="Views and tools">
        <button id="chatViewBtn" class="icon-button active" title="Chat" type="button">C</button>
        <button id="transcriptsViewBtn" class="icon-button" title="Transcripts collected" type="button">T</button>
        <button id="setupViewBtn" class="icon-button" title="Setup" type="button">S</button>
        <button id="refreshBtn" class="icon-button" title="Refresh index" type="button">R</button>
      </nav>
    </header>

    <main>
      <section id="chatView" class="view active" aria-label="Assistant chat">
        <div class="stats-strip" aria-label="Index statistics">
          <span><strong id="resourceCount">0</strong> resources</span>
          <span><strong id="videoCount">0</strong> videos</span>
          <span><strong id="transcriptCount">0</strong> transcripts</span>
        </div>

        <div id="chatMessages" class="chat-messages" aria-live="polite"></div>

        <form id="chatForm" class="chat-composer">
          <input
            id="queryInput"
            type="search"
            placeholder="Ask about Blackboard resources..."
            autocomplete="off"
          />
          <button id="searchBtn" class="send-button" title="Ask" type="submit">↑</button>
        </form>
      </section>

      <section id="setupView" class="view" aria-label="Setup">
        <section class="panel">
          <div class="panel-heading">
            <h2>Setup</h2>
            <span id="setupState"></span>
          </div>

          <div class="form-grid">
            <label for="providerSelect">API provider</label>
            <select id="providerSelect">
              <option value="openrouter">OpenRouter</option>
              <option value="openai">OpenAI</option>
              <option value="deepseek">DeepSeek</option>
            </select>

            <label for="modelInput">Model</label>
            <input id="modelInput" type="text" autocomplete="off" placeholder="openrouter/auto" />

            <label for="apiKeyInput">API key</label>
            <input id="apiKeyInput" type="password" autocomplete="off" placeholder="Stored locally in Chrome" />

            <p class="setup-note">
              API answering is opt-in. If enabled later, only the top matched Blackboard snippets and transcript
              segments are sent to the selected provider with your question.
            </p>

            <button id="saveSettingsBtn" type="button">Save setup</button>
          </div>
        </section>

        <section class="panel">
          <div class="panel-heading">
            <h2>Index Blackboard</h2>
            <span id="crawlState"></span>
          </div>

          <div class="form-grid">
            <label for="seedInput">Seed URL</label>
            <input id="seedInput" type="url" placeholder="Leave blank to use active Blackboard tab" autocomplete="off" />

            <label for="prefixInput">Allowed URL prefix</label>
            <input id="prefixInput" type="url" placeholder="Leave blank for same Blackboard site" autocomplete="off" />

            <div class="crawl-row">
              <label>
                <span>Max pages</span>
                <input id="maxPagesInput" type="number" min="1" max="300" value="80" />
              </label>
              <label>
                <span>Delay ms</span>
                <input id="delayInput" type="number" min="0" max="3000" value="120" />
              </label>
            </div>

            <div class="button-row">
              <button id="crawlBtn" type="button">Crawl</button>
              <button id="scanBtn" class="secondary" type="button">Scan Active Tab</button>
              <button id="clearBtn" class="secondary" type="button">Clear</button>
            </div>
          </div>
        </section>
      </section>

      <section id="transcriptsView" class="view" aria-label="Transcripts collected">
        <section class="panel">
          <div class="panel-heading">
            <h2>Transcripts Collected</h2>
            <span id="videoStatus"></span>
          </div>
          <div class="button-row">
            <button id="importBtn" type="button">Import Transcripts</button>
            <input id="transcriptFile" type="file" accept=".json,application/json" hidden />
          </div>
          <div id="transcriptGroups" class="transcript-groups"></div>
        </section>
      </section>
    </main>

    <template id="messageTemplate">
      <article class="message">
        <div class="message-body"></div>
      </article>
    </template>

    <template id="sourceTemplate">
      <article class="source-card">
        <div class="result-topline">
          <span class="type-pill"></span>
          <span class="score"></span>
        </div>
        <h3></h3>
        <p class="snippet"></p>
        <p class="source"></p>
        <a class="open-link" target="_blank" rel="noreferrer">Open source</a>
      </article>
    </template>

    <script src="sidepanel.js"></script>
  </body>
</html>
